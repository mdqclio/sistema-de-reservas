<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reservas - Alula</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema de Reservas</h2>
    <form id="reservationForm">
        <div class="form-group">
            <label for="name">Nombre del Huésped</label>
            <input type="text" id="name" name="name" placeholder="Ej: Juan Pérez" required>
        </div>
        <div class="form-group">
            <label for="checkin">Fecha de Ingreso</label>
            <input type="date" id="checkin" name="checkin" required>
        </div>
        <div class="form-group">
            <label for="checkout">Fecha de Egreso</label>
            <input type="date" id="checkout" name="checkout" required>
        </div>
        <div class="form-group">
            <label for="roomType">Tipo de Habitación</label>
            <select id="roomType" name="roomType">
                <option value="single">Individual</option>
                <option value="double">Doble</option>
                <option value="suite">Suite Histórica</option>
                <option value="pod">Cápsula (Pod)</option>
            </select>
        </div>
        <button type="submit">Confirmar Reserva</button>
    </form>
</div>

<script>
    document.getElementById('reservationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Aquí podrías conectar luego con tu Google Sheets mediante Apps Script
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());
        
        console.log("Datos de la reserva:", data);
        alert('Reserva enviada con éxito para ' + data.name);
        this.reset();
    });
</script>

</body>
</html>
