<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puerto Delfín — Gestión de Cabañas</title>
<style>
  :root { --accent: #3b82f6; --surface: #0f1e35; --text: #e8f0fe; }
  /* Estilo para el feedback del chatbot */
  .bot-feedback-tool { font-size: 10px; color: var(--accent); cursor: pointer; display: block; margin-top: 5px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <img src="logo-puerto-delfin.png" alt="Puerto Delfín" style="width:120px; margin-bottom:20px;">
    <input type="email" id="login-user" placeholder="Usuario Puerto Delfín">
    <input type="password" id="login-pass" placeholder="Contraseña">
    <button onclick="doLogin()">Entrar al Sistema</button>
  </div>
</div>

<div id="section-precios" class="section" style="display:none;">
  <h2>Configuración de Tarifas y Temporadas</h2>
  <div class="card">
    <p>Define aquí los precios base y fechas especiales (Fines de semana largos, Verano, etc.)</p>
    <div id="tarifas-container">
      </div>
    <button onclick="openNuevaTarifa()">+ Agregar Temporada/Fecha Especial</button>
  </div>
</div>

<script>
// --- CONFIGURACIÓN DE PRECIOS DINÁMICOS ---
async function calcularTarifa(fecha, cabañaId) {
  const tRef = db.collection('configuracion').doc('tarifas');
  const snap = await tRef.get();
  const tarifas = snap.data().especiales; // Array de {inicio, fin, multiplicador, nombre}

  let factor = 1.0; // Temporada Baja (Base)
  
  tarifas.forEach(t => {
    if (fecha >= t.inicio && fecha <= t.fin) {
      factor = t.multiplicador;
      console.log(`Aplicando tarifa: ${t.nombre} (x${t.multiplicador})`);
    }
  });

  const precioBase = await getPrecioBase(cabañaId);
  return precioBase * factor;
}

// --- CHATBOT INTELIGENTE (DISPONIBILIDAD + APRENDIZAJE) ---
async function chatbotBrain(userMsg) {
  // 1. Verificar si pregunta por disponibilidad
  if (userMsg.toLowerCase().includes('disponible') || userMsg.toLowerCase().includes('hay lugar')) {
    const reservasSnap = await db.collection('reservas').get();
    const ocupadas = reservasSnap.docs.map(doc => doc.data());
    
    // Lógica simple de cruce de fechas (se puede sofisticar)
    return "Estoy consultando el mapa de cabañas... ¿Para qué fecha buscas?";
  }

  // 2. Consulta Base de Conocimientos (KB)
  const kbRef = db.collection('kb');
  const snap = await kbRef.where('keywords', 'array-contains-any', userMsg.toLowerCase().split(' ')).get();
  
  if (!snap.empty) {
    return snap.docs[0].data().respuesta;
  } else {
    return "Aún no sé la respuesta. ¿Podrías enseñarme qué debería contestar? <span class='bot-feedback-tool' onclick='entrenarBot(\""+userMsg+"\")'>[Entrenar Chatbot]</span>";
  }
}

async function entrenarBot(preguntaOriginal) {
  const nuevaRespuesta = prompt(`¿Qué debería responder el bot a: "${preguntaOriginal}"?`);
  if (nuevaRespuesta) {
    await db.collection('kb').add({
      pregunta: preguntaOriginal,
      respuesta: nuevaRespuesta,
      keywords: preguntaOriginal.toLowerCase().split(' '),
      fecha: new Date()
    });
    alert("Conocimiento guardado. El bot ya aprendió esta respuesta.");
  }
}

// --- LIMPIEZA DE IDENTIDAD EN LOGIN ---
async function doLogin() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;

  // Ya no usamos 'admin@alula.com'. Ahora buscamos en la colección 'usuarios'
  try {
    const userSnapshot = await db.collection('usuarios').where('email', '==', user).get();
    if (!userSnapshot.empty) {
      const userData = userSnapshot.docs[0].data();
      if (userData.password === pass) { // En producción usar Firebase Auth
        document.getElementById('login-screen').style.display = 'none';
        showSection('dashboard');
      }
    } else {
      alert("Credenciales incorrectas para Puerto Delfín.");
    }
  } catch (e) {
    console.error("Error en login:", e);
  }
}

// ... (Resto de la lógica de la grilla adaptada a Cabañas) ...
</script>

</body>
</html>
